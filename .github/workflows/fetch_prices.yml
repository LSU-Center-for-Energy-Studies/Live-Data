name: Fetch Live Energy Prices

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch MISO + SPP prices and save data.json
        run: |
          python3 << 'EOF'
          import urllib.request
          import csv
          import json
          import io
          from datetime import datetime, timezone

          result = {
            "miso": {"price": None, "label": "Louisiana Hub", "source": "MISO South"},
            "spp":  {"price": None, "label": "NW Louisiana (SWEPCO)", "source": "SPP"},
            "updated_utc": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
            "updated_ts":  datetime.now(timezone.utc).isoformat()
          }

          # ── MISO: 5-min real-time current interval CSV ─────────────────────
          MISO_URL = (
            "https://api.misoenergy.org/MISORTWDBIReporter/Reporter.asmx"
            "?messageType=currentinterval&returnType=csv"
          )
          try:
            req = urllib.request.Request(MISO_URL, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as resp:
              raw = resp.read().decode("utf-8", errors="replace")

            print(f"MISO raw first 500 chars: {raw[:500]}")
            reader = csv.DictReader(io.StringIO(raw))
            rows = list(reader)
            print(f"MISO rows: {len(rows)}")
            if rows:
              print(f"MISO columns: {list(rows[0].keys())}")
              print(f"MISO first row: {rows[0]}")

            # Normalise column names
            def norm(r):
              return {k.strip().upper().replace('"','').replace(' ','_'): v.strip().replace('"','')
                      for k, v in r.items()}
            rows = [norm(r) for r in rows]

            node_col = next((c for c in ["CPNODE","PNODENAME","PNODE","NODE","NAME"]
                             if rows and c in rows[0]), None)
            lmp_col  = next((c for c in ["LMP","LMP_EXANTE","PRICE","VALUE"]
                             if rows and c in rows[0]), None)

            print(f"MISO node_col={node_col}, lmp_col={lmp_col}")

            la_row = None
            if node_col:
              la_row = next((r for r in rows
                             if "LOUISIANA" in r.get(node_col,"").upper()), None)
            print(f"MISO LA row: {la_row}")

            if la_row and lmp_col:
              val = float(la_row[lmp_col])
              result["miso"]["price"] = round(val, 2)
              result["miso"]["label"] = "Louisiana Hub"
            elif lmp_col and rows:
              # fallback: average all hub rows
              hub_rows = [r for r in rows if "HUB" in r.get(node_col or "","").upper()]
              targets  = hub_rows if hub_rows else rows
              vals = [float(r[lmp_col]) for r in targets
                      if r.get(lmp_col,"").replace(".","").replace("-","").isdigit()
                      or _try_float(r.get(lmp_col,""))]
              if vals:
                result["miso"]["price"] = round(sum(vals)/len(vals), 2)
                result["miso"]["label"] = "MISO Avg Hub (LA not found)"

          except Exception as e:
            print(f"MISO error: {e}")

          def _try_float(s):
            try: float(s); return True
            except: return False

          # ── SPP: 5-min real-time RTBM LMP by Bus CSV ──────────────────────
          SPP_URL = (
            "https://marketplace.spp.org/file-browser-api/download/rtbm-lmp-by-bus"
            "?path=/RTBM-LMP-B-latestInterval.csv"
          )
          try:
            req = urllib.request.Request(SPP_URL, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as resp:
              raw = resp.read().decode("utf-8", errors="replace")

            reader = csv.DictReader(io.StringIO(raw))
            rows   = list(reader)
            print(f"SPP rows: {len(rows)}")
            if rows:
              print(f"SPP columns: {list(rows[0].keys())}")

            def norm(r):
              return {k.strip().upper().replace('"','').replace(' ','_'): v.strip().replace('"','')
                      for k, v in r.items()}
            rows = [norm(r) for r in rows]

            node_col = next((c for c in ["PNODE","SETTLEMENT_LOCATION","NODE","NAME"]
                             if rows and c in rows[0]), None)
            lmp_col  = next((c for c in ["LMP","PRICE","VALUE"]
                             if rows and c in rows[0]), None)

            print(f"SPP node_col={node_col}, lmp_col={lmp_col}")

            # Filter SWEPCO nodes (NW Louisiana / Shreveport-Bossier area)
            LA_KW = ["SWEPCO","NWLA","AECI.LA"]
            la_rows = []
            if node_col:
              la_rows = [r for r in rows
                         if any(kw in r.get(node_col,"").upper() for kw in LA_KW)]
            print(f"SPP LA rows: {len(la_rows)}")

            targets = la_rows if la_rows else rows
            if lmp_col and targets:
              vals = []
              for r in targets:
                try: vals.append(float(r[lmp_col]))
                except: pass
              if vals:
                result["spp"]["price"] = round(sum(vals)/len(vals), 2)
                result["spp"]["label"] = "NW Louisiana (SWEPCO)" if la_rows else "SPP Avg Hub"

          except Exception as e:
            print(f"SPP error: {e}")

          # ── Write data.json ────────────────────────────────────────────────
          with open("data.json", "w") as f:
            json.dump(result, f, indent=2)
          print("Saved data.json:")
          print(json.dumps(result, indent=2))
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --staged --quiet || git commit -m "Auto: update energy prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

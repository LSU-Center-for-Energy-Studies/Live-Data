<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louisiana Electricity Prices</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .widget {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 18px 20px 14px;
    width: 100%;
    max-width: 280px;
  }
  .widget-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .widget-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.3px; text-transform: uppercase; color: #aaa;
  }
  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; color: #22c55e;
  }
  .live-dot {
    width: 6px; height: 6px; background: #22c55e;
    border-radius: 50%; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .price-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #f5f5f5;
  }
  .price-row:last-of-type { border-bottom: none; }

  .iso-info  { display: flex; flex-direction: column; gap: 3px; }
  .iso-name  { font-size: 13px; font-weight: 700; color: #111; }
  .iso-label { font-size: 10px; color: #bbb; }

  .price-right { text-align: right; }
  .price-val {
    font-size: 22px; font-weight: 700; color: #111;
    font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
    transition: color 0.6s ease;
  }
  .price-val.loading  { color: #e0e0e0; }
  .price-val.error    { color: #fca5a5; font-size: 12px; font-weight: 500; }
  .price-val.flash-up { color: #22c55e; }
  .price-val.flash-dn { color: #ef4444; }
  .price-unit { font-size: 10px; color: #ccc; margin-top: 2px; }

  .widget-footer {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #f0f0f0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-ts  { font-size: 9px; color: #ccc; }
  .footer-src { font-size: 9px; color: #ddd; }

  .bar { height: 2px; background: #f0f0f0; border-radius: 1px; margin-top: 10px; }
  .bar-fill {
    height: 100%; background: #22c55e; border-radius: 1px;
    width: 100%; transition: width 1s linear;
  }
</style>
</head>
<body>
<div class="widget">

  <div class="widget-header">
    <span class="widget-title">Louisiana LMP</span>
    <span class="live-badge"><span class="live-dot"></span>LIVE 5-MIN</span>
  </div>

  <div class="price-row">
    <div class="iso-info">
      <span class="iso-name">MISO South</span>
      <span class="iso-label" id="miso-label">Louisiana Hub</span>
    </div>
    <div class="price-right">
      <div class="price-val loading" id="miso-val">—</div>
      <div class="price-unit">$/MWh</div>
    </div>
  </div>

  <div class="price-row">
    <div class="iso-info">
      <span class="iso-name">SPP</span>
      <span class="iso-label" id="spp-label">NW Louisiana (SWEPCO)</span>
    </div>
    <div class="price-right">
      <div class="price-val loading" id="spp-val">—</div>
      <div class="price-unit">$/MWh</div>
    </div>
  </div>

  <div class="widget-footer">
    <span class="footer-ts" id="ts">Fetching...</span>
    <span class="footer-src">misoenergy.org · spp.org</span>
  </div>

  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  HOW THIS WORKS — NO CORS PROXY NEEDED
//
//  GitHub Actions runs fetch_prices.yml every 5 minutes.
//  It fetches MISO + SPP CSVs server-side (no CORS restriction on servers)
//  and saves the result as data.json in this same repo.
//
//  This widget reads data.json from the SAME origin (GitHub Pages) —
//  same-origin requests never have CORS issues. Completely reliable.
// ─────────────────────────────────────────────────────────────────────────────

const RELOAD_MS = 5 * 60 * 1000;  // reload every 5 min

const prev = {};

function setVal(id, price, labelId, labelText) {
  const el  = document.getElementById(id);
  const lbl = labelId ? document.getElementById(labelId) : null;
  if (!el) return;

  if (price === null || price === undefined) {
    el.textContent = "N/A";
    el.className   = "price-val error";
    return;
  }

  const num = parseFloat(price);
  if (!isNaN(num)) {
    // flash animation when price changes
    if (prev[id] !== undefined) {
      const diff = num - parseFloat(prev[id]);
      if (Math.abs(diff) > 0.01) {
        el.className = "price-val " + (diff > 0 ? "flash-up" : "flash-dn");
        setTimeout(() => el.className = "price-val", 1800);
      } else {
        el.className = "price-val";
      }
    } else {
      el.className = "price-val";
    }
    prev[id]       = price;
    el.textContent = "$" + num.toFixed(2);
  }

  if (lbl && labelText) lbl.textContent = labelText;
}

function setTS(utcStr) {
  const el = document.getElementById("ts");
  if (!el) return;
  // Convert UTC string to local time for display
  try {
    const d   = new Date(utcStr);
    el.textContent = "Updated " +
      d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) +
      " (local)";
  } catch {
    el.textContent = "Updated " + (utcStr || "—");
  }
}

// Countdown bar
let t0 = Date.now();
setInterval(() => {
  const fill = document.getElementById("bar-fill");
  if (fill) fill.style.width =
    Math.max(0, 100 - ((Date.now() - t0) / RELOAD_MS) * 100) + "%";
}, 1000);

// ── Fetch data.json from same repo ───────────────────────────────────────────
async function loadPrices() {
  try {
    // cache-bust so browser always fetches latest version
    const res  = await fetch("data.json?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    setVal("miso-val", data.miso?.price, "miso-label", data.miso?.label);
    setVal("spp-val",  data.spp?.price,  "spp-label",  data.spp?.label);
    setTS(data.updated_ts || data.updated_utc);

  } catch (e) {
    console.warn("data.json fetch failed:", e.message);
    setVal("miso-val", null);
    setVal("spp-val",  null);
    const ts = document.getElementById("ts");
    if (ts) ts.textContent = "Fetch failed — retrying...";
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
async function refresh() {
  t0 = Date.now();
  await loadPrices();
}

refresh();
setInterval(refresh, RELOAD_MS);
</script>
</body>
</html>

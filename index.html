<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Prices</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 0;
  }

  .widget {
    background: #ffffff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 18px 20px;
    width: 100%;
    max-width: 280px;
  }

  /* ── Header ── */
  .widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .widget-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #999;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    color: #22c55e;
    letter-spacing: 0.5px;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Price rows ── */
  .price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .price-row:last-of-type { border-bottom: none; }

  .iso-info { display: flex; flex-direction: column; gap: 3px; }
  .iso-name {
    font-size: 13px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.2px;
  }
  .iso-label {
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.3px;
  }

  .price-info { text-align: right; }
  .price-val {
    font-size: 20px;
    font-weight: 700;
    color: #111;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .price-unit {
    font-size: 10px;
    color: #bbb;
    margin-top: 2px;
  }

  /* ── Loading / error states ── */
  .price-val.loading { color: #ddd; }
  .price-val.error   { color: #f87171; font-size: 13px; }

  /* ── Footer ── */
  .widget-footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-ts {
    font-size: 9px;
    color: #ccc;
    letter-spacing: 0.3px;
  }
  .footer-src {
    font-size: 9px;
    color: #ddd;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="widget">

  <div class="widget-header">
    <span class="widget-title">Electricity LMP</span>
    <span class="live-badge">
      <span class="live-dot"></span>
      LIVE
    </span>
  </div>

  <!-- MISO -->
  <div class="price-row">
    <div class="iso-info">
      <span class="iso-name">MISO</span>
      <span class="iso-label">Avg Hub LMP</span>
    </div>
    <div class="price-info">
      <div class="price-val loading" id="miso-price">—</div>
      <div class="price-unit">$/MWh</div>
    </div>
  </div>

  <!-- SPP -->
  <div class="price-row">
    <div class="iso-info">
      <span class="iso-name">SPP</span>
      <span class="iso-label">Avg Hub LMP</span>
    </div>
    <div class="price-info">
      <div class="price-val loading" id="spp-price">—</div>
      <div class="price-unit">$/MWh</div>
    </div>
  </div>

  <div class="widget-footer">
    <span class="footer-ts" id="last-updated">Fetching...</span>
    <span class="footer-src">MISO · SPP public data</span>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const REFRESH_MS  = 5 * 60 * 1000;   // refresh every 5 minutes

// ── CORS proxy (required — browser can't call MISO/SPP directly) ─────────────
// Uses allorigins.win — free, no key, works in browser
const PROXY = "https://api.allorigins.win/raw?url=";

const MISO_URL = PROXY + encodeURIComponent(
  "https://api.misoenergy.org/MISORTWDBIReporter/Reporter.asmx?messageType=currentinterval&returnType=csv"
);
const SPP_URL  = PROXY + encodeURIComponent(
  "https://marketplace.spp.org/file-browser-api/download/rtbm-lmp-by-bus?path=/RTBM-LMP-B-latestInterval.csv"
);

// ── Parse CSV text → array of row objects ────────────────────────────────────
function parseCSV(text) {
  const lines  = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().toUpperCase().replace(/"/g,""));
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/"/g,""));
    const obj  = {};
    headers.forEach((h, i) => obj[h] = vals[i] || "");
    return obj;
  });
}

// ── Find the LMP column regardless of exact name ─────────────────────────────
function findCol(headers, candidates) {
  for (const c of candidates) {
    const found = headers.find(h => h === c);
    if (found) return found;
  }
  return null;
}

// ── Calculate average LMP from parsed rows ───────────────────────────────────
function avgLMP(rows, lmpCandidates) {
  if (!rows || rows.length === 0) return null;
  const headers = Object.keys(rows[0]);
  const col = findCol(headers, lmpCandidates);
  if (!col) return null;
  const vals = rows
    .map(r => parseFloat(r[col]))
    .filter(v => !isNaN(v));
  if (vals.length === 0) return null;
  return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2);
}

// ── Update DOM ────────────────────────────────────────────────────────────────
function setPrice(elId, value) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (value === null) {
    el.textContent = "N/A";
    el.className   = "price-val error";
  } else {
    el.textContent = "$" + value;
    el.className   = "price-val";
  }
}

function setTimestamp() {
  const el = document.getElementById("last-updated");
  if (el) {
    const now = new Date();
    el.textContent = "Updated " + now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
}

// ── Fetch MISO ────────────────────────────────────────────────────────────────
async function fetchMISO() {
  try {
    const res  = await fetch(MISO_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    // MISO LMP column candidates (in priority order)
    const avg  = avgLMP(rows, ["LMP","LMP_EXANTE","VALUE","PRICE"]);
    setPrice("miso-price", avg);
  } catch (e) {
    console.warn("MISO fetch failed:", e.message);
    setPrice("miso-price", null);
  }
}

// ── Fetch SPP ─────────────────────────────────────────────────────────────────
async function fetchSPP() {
  try {
    const res  = await fetch(SPP_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    // SPP LMP column candidates
    const avg  = avgLMP(rows, ["LMP","PRICE","VALUE"]);
    setPrice("spp-price", avg);
  } catch (e) {
    console.warn("SPP fetch failed:", e.message);
    setPrice("spp-price", null);
  }
}

// ── Main refresh loop ─────────────────────────────────────────────────────────
async function refresh() {
  await Promise.all([fetchMISO(), fetchSPP()]);
  setTimestamp();
}

// Run immediately then on schedule
refresh();
setInterval(refresh, REFRESH_MS);
</script>

</body>
</html>

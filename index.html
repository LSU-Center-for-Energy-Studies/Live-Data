ctricity Pr<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louisiana Electricity Prices</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .widget {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 18px 20px 14px;
    width: 100%;
    max-width: 280px;
  }
  .widget-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .widget-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.3px; text-transform: uppercase; color: #aaa;
  }
  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; color: #22c55e;
  }
  .live-dot {
    width: 6px; height: 6px; background: #22c55e;
    border-radius: 50%; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .price-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #f5f5f5;
  }
  .price-row:last-of-type { border-bottom: none; }

  .iso-info  { display: flex; flex-direction: column; gap: 3px; }
  .iso-name  { font-size: 13px; font-weight: 700; color: #111; }
  .iso-label { font-size: 10px; color: #bbb; }

  .price-right { text-align: right; }
  .price-val {
    font-size: 22px; font-weight: 700; color: #111;
    font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
    transition: color 0.6s ease;
  }
  .price-val.loading  { color: #e0e0e0; }
  .price-val.error    { color: #fca5a5; font-size: 12px; font-weight: 500; }
  .price-val.flash-up { color: #22c55e; }
  .price-val.flash-dn { color: #ef4444; }
  .price-unit     { font-size: 10px; color: #ccc; margin-top: 2px; }
  .price-interval { font-size: 9px;  color: #ddd; margin-top: 1px; }

  .widget-footer {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #f0f0f0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-ts  { font-size: 9px; color: #ccc; }
  .footer-src { font-size: 9px; color: #ddd; }

  .bar { height: 2px; background: #f0f0f0; border-radius: 1px; margin-top: 10px; }
  .bar-fill {
    height: 100%; background: #22c55e; border-radius: 1px;
    width: 100%; transition: width 1s linear;
  }
</style>
</head>
<body>
<div class="widget">

  <div class="widget-header">
    <span class="widget-title">Louisiana LMP</span>
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>
  </div>

  <div class="price-row">
    <div class="iso-info">
      <span class="iso-name">MISO South</span>
      <span class="iso-label">Louisiana Hub · ExAnte LMP</span>
    </div>
    <div class="price-right">
      <div class="price-val loading" id="miso-val">—</div>
      <div class="price-unit">$/MWh</div>
      <div class="price-interval" id="miso-interval"></div>
    </div>
  </div>

  <div class="price-row">
    <div class="iso-info">
      <span class="iso-name">SPP</span>
      <span class="iso-label">NW Louisiana · SWEPCO</span>
    </div>
    <div class="price-right">
      <div class="price-val loading" id="spp-val">—</div>
      <div class="price-unit">$/MWh</div>
    </div>
  </div>

  <div class="widget-footer">
    <span class="footer-ts" id="ts">Fetching...</span>
    <span class="footer-src">misoenergy.org · spp.org</span>
  </div>

  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
</div>

<script>
const REFRESH_MS = 5 * 60 * 1000;

const MISO_URL = "https://public-api.misoenergy.org/api/MarketPricing/GetExAnteLmp";
const SPP_URL  = "https://marketplace.spp.org/file-browser-api/download/rtbm-lmp-by-bus?path=/RTBM-LMP-B-latestInterval.csv";

// All proxies tried in order for both MISO and SPP
const PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

// ── Generic fetch through proxy chain ────────────────────────────────────────
async function proxyFetch(url) {
  // Try direct first (works if server has CORS headers)
  try {
    const r = await fetch(url, { cache:"no-store", signal: AbortSignal.timeout(6000) });
    if (r.ok) {
      const t = await r.text();
      if (t && t.length > 10) return t;
    }
  } catch {}

  // Then try each proxy
  for (const mkUrl of PROXIES) {
    try {
      const r = await fetch(mkUrl(url), { cache:"no-store", signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      const t = await r.text();
      if (t && t.length > 10) return t;
    } catch { continue; }
  }
  return null;
}

// ── Flash helper ──────────────────────────────────────────────────────────────
const prev = {};
function setVal(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  if (value === null || value === undefined) {
    el.textContent = "N/A"; el.className = "price-val error"; return;
  }
  const num = parseFloat(value);
  if (isNaN(num)) { el.textContent = "N/A"; el.className = "price-val error"; return; }
  if (prev[id] !== undefined) {
    const diff = num - parseFloat(prev[id]);
    if (Math.abs(diff) > 0.01) {
      el.className = "price-val " + (diff > 0 ? "flash-up" : "flash-dn");
      setTimeout(() => el.className = "price-val", 1800);
    } else { el.className = "price-val"; }
  } else { el.className = "price-val"; }
  prev[id] = value;
  el.textContent = "$" + num.toFixed(2);
}

// ── MISO ──────────────────────────────────────────────────────────────────────
async function fetchMISO() {
  const text = await proxyFetch(MISO_URL);
  if (!text) { setVal("miso-val", null); return; }
  try {
    const data     = JSON.parse(text);
    const hubs     = data?.LMPData?.ExAnteLMP?.Hub || [];
    const interval = data?.LMPData?.RefId || "";
    const laHub    = hubs.find(h => h.name === "LOUISIANA.HUB");
    if (laHub) {
      setVal("miso-val", laHub.LMP);
      const el = document.getElementById("miso-interval");
      if (el) el.textContent = interval;
    } else {
      setVal("miso-val", null);
    }
  } catch { setVal("miso-val", null); }
}

// ── SPP ───────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const hdrs = lines[0].split(",").map(h => h.trim().toUpperCase().replace(/"/g,""));
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/"/g,""));
    const row  = {};
    hdrs.forEach((h, i) => row[h] = vals[i] ?? "");
    return row;
  });
}

async function fetchSPP() {
  const text = await proxyFetch(SPP_URL);
  if (!text) { setVal("spp-val", null); return; }
  const rows    = parseCSV(text);
  if (!rows.length) { setVal("spp-val", null); return; }
  const nodeKey = ["PNODE","SETTLEMENT_LOCATION","NODE","NAME"].find(k => k in rows[0]);
  const lmpKey  = ["LMP","PRICE","VALUE"].find(k => k in rows[0]);
  if (!lmpKey) { setVal("spp-val", null); return; }
  const LA_KW  = ["SWEPCO","NWLA"];
  const laRows = nodeKey
    ? rows.filter(r => LA_KW.some(kw => (r[nodeKey]||"").toUpperCase().includes(kw)))
    : [];
  const target = laRows.length ? laRows : rows;
  const vals   = target.map(r => parseFloat(r[lmpKey])).filter(v => !isNaN(v));
  if (!vals.length) { setVal("spp-val", null); return; }
  setVal("spp-val", (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2));
}

// ── Countdown bar ─────────────────────────────────────────────────────────────
let t0 = Date.now();
setInterval(() => {
  const f = document.getElementById("bar-fill");
  if (f) f.style.width = Math.max(0, 100-((Date.now()-t0)/REFRESH_MS)*100) + "%";
}, 1000);

// ── Main ──────────────────────────────────────────────────────────────────────
async function refresh() {
  t0 = Date.now();
  await Promise.all([fetchMISO(), fetchSPP()]);
  const el = document.getElementById("ts");
  if (el) el.textContent = "Updated " +
    new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
